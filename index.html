<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bin ich handysüchtig? – Selbsttest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --ink: #1A1917;
    --ink-muted: #6B6A66;
    --ink-faint: #A8A7A3;
    --border: rgba(26,25,23,0.1);
    --border-md: rgba(26,25,23,0.18);
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-dark: #26215C;
    --green: #0F6E56;
    --green-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    padding: 2rem 1.5rem 0;
    max-width: 680px;
    margin: 0 auto;
  }

  .site-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 1.5rem;
  }

  .hero-headline {
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 300;
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 0.75rem;
  }

  .hero-headline em {
    font-style: italic;
    color: var(--purple);
  }

  .hero-sub {
    font-size: 15px;
    color: var(--ink-muted);
    max-width: 480px;
    margin-bottom: 2rem;
  }

  /* ── Screen number indicator ── */
  .screen-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  /* ── Progress ── */
  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 2.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 2px;
    background: var(--purple);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Main layout ── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-md);
    padding: 2rem;
    margin-bottom: 1.25rem;
  }

  .q-cat {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 0.75rem;
  }

  .q-text {
    font-size: 19px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  /* ── Options ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    -webkit-appearance: none;
  }

  .opt:hover {
    border-color: var(--purple);
    background: var(--purple-light);
    transform: translateX(3px);
  }

  .opt.selected {
    border: 1.5px solid var(--purple);
    background: var(--purple-light);
    color: var(--purple-dark);
  }

  .opt-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-md);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .opt.selected .opt-dot {
    background: var(--purple);
    border-color: var(--purple);
  }

  .opt.selected .opt-dot::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
  }

  .opt-text {
    flex: 1;
    line-height: 1.4;
  }

  /* ── Navigation ── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 0.5px solid var(--border-md);
    background: var(--surface);
    color: var(--ink);
  }

  .btn:hover { background: var(--bg); }

  .btn-primary {
    background: var(--purple);
    color: white;
    border-color: var(--purple);
  }

  .btn-primary:hover { background: var(--purple-dark); border-color: var(--purple-dark); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  /* ── Intro screen ── */
  .intro-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-md);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin: 1.5rem 0;
  }

  .stat-cell {
    background: var(--bg);
    padding: 1rem 0.75rem;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 500;
    color: var(--purple);
    display: block;
    letter-spacing: -0.02em;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .intro-note {
    font-size: 13px;
    color: var(--ink-muted);
    line-height: 1.6;
    padding: 12px 16px;
    background: var(--purple-light);
    border-radius: var(--radius-sm);
    border-left: 2.5px solid var(--purple);
  }

  /* ── Result screen ── */
  .result-hero {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-md);
    padding: 2.5rem 2rem;
    text-align: center;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--result-color, var(--purple));
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .result-pct {
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -0.04em;
    color: var(--result-color, var(--purple));
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .result-label {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
  }

  .result-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin: 1.25rem auto;
    max-width: 320px;
  }

  .result-bar-fill {
    height: 6px;
    border-radius: 99px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .result-desc {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto;
  }

  /* ── Category breakdown ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.75rem;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .cat-card {
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    padding: 1rem 1.1rem;
  }

  .cat-name {
    font-size: 12px;
    color: var(--ink-muted);
    margin-bottom: 8px;
    font-weight: 400;
  }

  .cat-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .cat-bar-fill {
    height: 4px;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .cat-score-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .cat-pct {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .cat-verdict {
    font-size: 11px;
    color: var(--ink-faint);
  }

  /* ── Tips card ── */
  .tips-card {
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-lg);
    padding: 1.5rem 2rem;
    margin-bottom: 1.25rem;
  }

  .tips-card h3 {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
  }

  .tip-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 0.75rem;
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.5;
  }

  .tip-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── Source note ── */
  .source {
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    margin-top: 2rem;
    line-height: 1.6;
  }

  /* ── Animations ── */
  .fade-in {
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .cat-grid { grid-template-columns: 1fr; }
    .stat-row { grid-template-columns: 1fr; }
    .q-card, .intro-card, .result-hero, .tips-card { padding: 1.5rem; }
    .result-pct { font-size: 56px; }
  }
</style>
</head>
<body>

<header>
  <div class="site-tag">Schulprojekt · Handysucht · Selbsttest</div>
  <h1 class="hero-headline">Bin ich <em>handysüchtig</em>?</h1>
  <p class="hero-sub">15 ehrliche Fragen, die dir zeigen, wie du wirklich mit deinem Smartphone umgehst.</p>
</header>

<main id="app"></main>

<script>
const questions = [
  { cat: "Kontrollverlust", text: "Wie oft nimmst du dein Handy in die Hand, ohne einen bestimmten Grund?" , opts: ["Fast nie", "Manchmal (1–2x täglich)", "Oft (mehrmals täglich)", "Ständig – fast automatisch"] },
  { cat: "Entzug", text: "Wie fühlst du dich, wenn du mehrere Stunden lang kein Handy benutzen kannst?", opts: ["Entspannt und unbesorgt", "Leicht unruhig", "Nervös und ungeduldig", "Sehr gestresst oder ängstlich"] },
  { cat: "Schlaf", text: "Schaust du auf dein Handy kurz bevor du schläfst oder direkt nach dem Aufwachen?", opts: ["Nein, fast nie", "Selten", "Oft", "Ja, immer – es ist das Erste und Letzte"] },
  { cat: "Soziales", text: "Benutzt du dein Handy während du mit anderen Menschen zusammen bist (Essen, Gespräche)?", opts: ["Nein, nie", "Selten", "Manchmal", "Ja, sehr oft"] },
  { cat: "Zeitwahrnehmung", text: "Verlierst du beim Handy-Benutzen das Gefühl für die Zeit?", opts: ["Nein", "Selten", "Manchmal", "Sehr oft – Stunden vergehen unbemerkt"] },
  { cat: "Kontrollverlust", text: "Hast du schon versucht, weniger auf dein Handy zu schauen, aber es nicht geschafft?", opts: ["Nein, ich nutze es bewusst", "Einmal versucht", "Mehrmals versucht, ohne grossen Erfolg", "Oft versucht – es gelingt mir kaum"] },
  { cat: "Schlaf", text: "Liegst du nachts wach und schaust auf dein Handy, statt zu schlafen?", opts: ["Nie", "Selten", "Manchmal", "Regelmässig"] },
  { cat: "Entzug", text: "Wirst du unruhig oder gereizt, wenn jemand dein Handy wegnimmt oder der Akku leer ist?", opts: ["Nein, ich bleibe ruhig", "Leicht genervt", "Ziemlich genervt", "Sehr aufgewühlt"] },
  { cat: "Soziales", text: "Bevorzugst du es, auf dem Handy zu kommunizieren statt persönlich zu reden?", opts: ["Nein, ich mag persönliche Gespräche mehr", "Es ist etwa gleich", "Eher online", "Ja, fast immer online"] },
  { cat: "Zeitwahrnehmung", text: "Wie viele Stunden am Tag nutzt du dein Handy schätzungsweise (ausser Schule/Arbeit)?", opts: ["Unter 1 Stunde", "1–2 Stunden", "3–4 Stunden", "5 Stunden oder mehr"] },
  { cat: "Kontrollverlust", text: "Nutzt du dein Handy, um dich von schlechten Gefühlen oder Langeweile abzulenken?", opts: ["Selten oder nie", "Manchmal", "Oft", "Fast immer"] },
  { cat: "Entzug", text: "Prüfst du dein Handy auf Nachrichten, obwohl es nicht gepiept hat?", opts: ["Nein", "Selten", "Manchmal", "Sehr oft – aus reiner Gewohnheit"] },
  { cat: "Soziales", text: "Hat dich schon jemand (Familie, Freunde) darauf angesprochen, dass du zu viel auf dein Handy schaust?", opts: ["Nein, nie", "Einmal", "Mehrmals", "Oft – und ich finde es normal"] },
  { cat: "Schlaf", text: "Wie lange vor dem Einschlafen legst du dein Handy weg?", opts: ["Über 1 Stunde vorher", "30–60 Minuten", "Kurz davor (unter 15 Min.)", "Ich schlafe ein, während ich schaue"] },
  { cat: "Zeitwahrnehmung", text: "Checkst du dein Handy während des Unterrichts oder bei wichtigen Momenten heimlich?", opts: ["Nein, nie", "Selten", "Manchmal", "Regelmässig"] }
];

const cats = ["Kontrollverlust", "Entzug", "Schlaf", "Soziales", "Zeitwahrnehmung"];
const catColors = {
  "Kontrollverlust": "#534AB7",
  "Entzug": "#D85A30",
  "Schlaf": "#0F6E56",
  "Soziales": "#D4537E",
  "Zeitwahrnehmung": "#BA7517"
};

const tips = {
  low: [
    { icon: "✓", text: "Du gehst schon sehr bewusst mit deinem Handy um – versuch dieses Bewusstsein zu behalten." },
    { icon: "📱", text: "Schaue weiterhin ab und zu auf deine Bildschirmzeit in den Einstellungen, nur zur Kontrolle." },
    { icon: "💬", text: "Teile deine Gewohnheiten mit Freunden, die vielleicht mehr kämpfen – dein Beispiel hilft." }
  ],
  mid: [
    { icon: "🌙", text: "Lege dein Handy 30 Minuten vor dem Schlafen weg und lade es ausserhalb des Schlafzimmers." },
    { icon: "⏱", text: "Setze dir täglich ein Limit in den Screen-Time-Einstellungen (iOS) oder Digital Wellbeing (Android)." },
    { icon: "🍽", text: "Probiere handyfreie Zeiten ein: beim Essen und im Gespräch mit Familie oder Freunden." }
  ],
  high: [
    { icon: "🚫", text: "Deaktiviere alle nicht-wichtigen Benachrichtigungen – jede Ping-Meldung lädt zum Greifen ein." },
    { icon: "⏰", text: "Starte den Tag ohne Handy: Leg dir einen klassischen Wecker und schau erst nach 30 Min. auf dein Gerät." },
    { icon: "🧠", text: "Sprich mit einer Vertrauensperson (Eltern, Lehrperson) über deine Handygewohnheiten." },
    { icon: "📵", text: "Probiere bewusst handyfreie Tage oder Stunden – starte mit 2 Stunden und steigere dich." }
  ]
};

let answers = new Array(questions.length).fill(null);
let current = 0;
let phase = "intro";

function getLevel(pct) {
  if (pct < 30) return { label: "Kein Anzeichen von Sucht", color: "#0F6E56", bg: "#E1F5EE", tipLevel: "low", desc: "Du gehst sehr bewusst mit deinem Handy um. Es ist für dich ein Werkzeug, keine Ablenkung. Behalte dieses Bewusstsein." };
  if (pct < 50) return { label: "Kontrollierter Gebrauch", color: "#3B6D11", bg: "#EAF3DE", tipLevel: "low", desc: "Du nutzt dein Handy regelmässig, hast aber die Kontrolle. Achte trotzdem auf kritische Momente – z.B. direkt vor dem Einschlafen." };
  if (pct < 65) return { label: "Problematischer Gebrauch", color: "#BA7517", bg: "#FAEEDA", tipLevel: "mid", desc: "Es gibt Bereiche, wo das Handy deinen Alltag beeinflusst. Kleine gezielte Veränderungen können schon viel bewirken." };
  if (pct < 80) return { label: "Starke Abhängigkeitszeichen", color: "#D85A30", bg: "#FAECE7", tipLevel: "high", desc: "Du zeigst deutliche Merkmale von problematischem Handykonsum. Handyfreie Zeiten und bewusste Pausen sind jetzt wichtig." };
  return { label: "Sehr hohe Abhängigkeit", color: "#A32D2D", bg: "#FCEBEB", tipLevel: "high", desc: "Dein Handykonsum beeinträchtigt wahrscheinlich deinen Alltag stark. Such dir Unterstützung – bei Lehrpersonen, Eltern oder einer Fachstelle." };
}

function catScore(cat) {
  const qs = questions.map((q, i) => ({ ...q, idx: i })).filter(q => q.cat === cat);
  const total = qs.reduce((sum, q) => sum + (answers[q.idx] ?? 0), 0);
  return Math.round((total / (qs.length * 3)) * 100);
}

function catVerdict(pct) {
  if (pct < 35) return "gut";
  if (pct < 60) return "okay";
  if (pct < 80) return "kritisch";
  return "hoch";
}

function renderIntro() {
  document.getElementById("app").innerHTML = `
    <div class="fade-in">
      <div class="intro-card">
        <p style="font-size:15px; color:var(--ink-muted); line-height:1.7; margin-bottom:1.25rem;">
          Dieser Test hilft dir herauszufinden, wie du wirklich mit deinem Smartphone umgehst – 
          ehrlich, ohne Urteil. Die Fragen basieren auf anerkannten Kriterien aus der Suchtforschung.
        </p>
        <div class="stat-row">
          <div class="stat-cell">
            <span class="stat-num">15</span>
            <div class="stat-lbl">Fragen</div>
          </div>
          <div class="stat-cell">
            <span class="stat-num">5</span>
            <div class="stat-lbl">Bereiche</div>
          </div>
          <div class="stat-cell">
            <span class="stat-num">~3 Min</span>
            <div class="stat-lbl">Dauer</div>
          </div>
        </div>
        <div class="intro-note">
          Deine Antworten bleiben privat – alles wird nur in deinem Browser berechnet, nichts wird gespeichert oder übermittelt.
        </div>
      </div>
      <div style="margin-bottom:0.75rem;">
        <div class="section-label">Die 5 Bereiche</div>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          ${cats.map(c => `<span style="padding:6px 12px; border-radius:99px; font-size:12px; font-weight:500; background:var(--purple-light); color:var(--purple-dark); border:0.5px solid rgba(83,74,183,0.2);">${c}</span>`).join('')}
        </div>
      </div>
      <div style="margin-top:1.5rem;">
        <button class="btn btn-primary" onclick="startTest()" style="width:100%; padding:16px; font-size:15px;">Test starten →</button>
      </div>
    </div>
  `;
}

function renderQuestion() {
  const q = questions[current];
  const progress = (current / questions.length) * 100;
  document.getElementById("app").innerHTML = `
    <div class="fade-in">
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="screen-counter">${current + 1} / ${questions.length}</div>
      <div class="q-card">
        <div class="q-cat">${q.cat}</div>
        <p class="q-text">${q.text}</p>
      </div>
      <div class="options">
        ${q.opts.map((o, i) => `
          <button class="opt${answers[current] === i ? ' selected' : ''}" onclick="selectOpt(${i})">
            <span class="opt-dot"></span>
            <span class="opt-text">${o}</span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row" style="margin-top:1.5rem;">
        <button class="btn" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← Zurück</button>
        <button class="btn btn-primary" id="nextBtn" onclick="goNext()" ${answers[current] === null ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'Ergebnis ansehen →' : 'Weiter →'}
        </button>
      </div>
    </div>
  `;
}

function renderResult() {
  const totalScore = answers.reduce((s, a) => s + (a ?? 0), 0);
  const maxScore = questions.length * 3;
  const pct = Math.round((totalScore / maxScore) * 100);
  const level = getLevel(pct);
  const currentTips = tips[level.tipLevel];

  document.getElementById("app").innerHTML = `
    <div class="fade-in">
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
      <div class="result-hero" style="--result-color:${level.color};">
        <div style="font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:0.5rem;">Dein Ergebnis</div>
        <div class="result-pct" id="resultPct">${pct}%</div>
        <div class="result-label">${level.label}</div>
        <div class="result-bar-bg">
          <div class="result-bar-fill" id="resultBar" style="background:${level.color};"></div>
        </div>
        <p class="result-desc">${level.desc}</p>
      </div>

      <div class="section-label">Auswertung nach Bereich</div>
      <div class="cat-grid">
        ${cats.map(cat => {
          const s = catScore(cat);
          const v = catVerdict(s);
          return `<div class="cat-card">
            <div class="cat-name">${cat}</div>
            <div class="cat-bar-bg">
              <div class="cat-bar-fill" data-pct="${s}" style="background:${catColors[cat]};"></div>
            </div>
            <div class="cat-score-row">
              <span class="cat-pct" style="color:${catColors[cat]}">${s}%</span>
              <span class="cat-verdict">${v}</span>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="tips-card">
        <h3>Was du tun kannst</h3>
        ${currentTips.map(t => `
          <div class="tip-item">
            <span class="tip-icon">${t.icon}</span>
            <span>${t.text}</span>
          </div>
        `).join('')}
      </div>

      <button class="btn btn-primary" onclick="restartTest()" style="width:100%; padding:14px; font-size:14px;">Test wiederholen</button>

      <div class="source">
        Basiert auf Kriterien der Smartphone Addiction Scale (SAS, Kwon et al., 2013).<br>
        Kein klinisches Diagnosewerkzeug – dient der persönlichen Selbstreflexion.
      </div>
    </div>
  `;

  setTimeout(() => {
    const bar = document.getElementById("resultBar");
    if (bar) bar.style.width = pct + "%";
    document.querySelectorAll(".cat-bar-fill[data-pct]").forEach(el => {
      el.style.width = el.getAttribute("data-pct") + "%";
    });
  }, 150);
}

function startTest() { phase = "test"; current = 0; render(); }
function selectOpt(i) { answers[current] = i; render(); }
function goBack() { if (current > 0) { current--; render(); } }
function goNext() {
  if (answers[current] === null) return;
  if (current === questions.length - 1) { phase = "result"; render(); }
  else { current++; render(); }
}
function restartTest() {
  answers = new Array(questions.length).fill(null);
  current = 0;
  phase = "intro";
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (phase === "intro") renderIntro();
  else if (phase === "test") renderQuestion();
  else renderResult();
}

render();
</script>
</body>
</html>
